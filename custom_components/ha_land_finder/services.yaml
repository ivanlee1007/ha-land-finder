start:
  name: Start Land Finder
  description: Start the managed 591 Land Finder Node.js server.
stop:
  name: Stop Land Finder
  description: Stop the managed 591 Land Finder Node.js server.
restart:
  name: Restart Land Finder
  description: Restart the managed 591 Land Finder Node.js server.
update:
  name: Update Land Finder source
  description: Pull the configured Land Finder Git repository.
init_db:
  name: Initialize Land Finder database
  description: Run npm run init-db for the managed Land Finder app.
